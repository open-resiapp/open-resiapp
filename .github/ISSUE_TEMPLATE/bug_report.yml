name: Bug Report
description: Report something that isn't working correctly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Tell us what went wrong...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: What should have happened instead...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: How are you running OpenResiApp?
      options:
        - Docker (docker-compose)
        - Local development (npm run dev)
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Docker tag
      description: Which version or Docker image tag are you using?
      placeholder: "e.g. latest, v1.0.0"

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the issue.

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Any relevant logs from the browser console or Docker logs.
      render: shell